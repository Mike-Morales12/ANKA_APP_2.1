<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>ANKA — Prototipo HTML v1.4.4 Beta cerrada</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --blue-900:#0D47A1; --blue-700:#1565C0; --blue-400:#42A5F5; --blue-100:#90CAF9; --blue-50:#E3F2FD; --white:#FFFFFF;
  --text-900:#111827; --text-700:#374151; --gray-200:#E5E7EB; --bg:#F3F4F6;
  --success:#22C55E; --success-bg:#EAFBF1; --warning:#F59E0B; --warning-bg:#FEF6E7; --critical:#EF4444; --critical-bg:#FDECEC; --info:#8B5CF6; --info-bg:#F1EBFD;
  --r-input:12px; --r-btn:16px; --r-card:24px; --r-sheet:32px;
  --shadow:0 4px 16px rgba(0,0,0,0.06);
  --sp-1:4px; --sp-2:8px; --sp-3:16px; --sp-4:24px; --sp-5:32px; --sp-6:48px;
  /* Altura real visible del navegador móvil. 100vh en celulares suele medir la pantalla
     COMPLETA como si no hubiera barra de direcciones ni teclado, así que el contenido
     queda más alto de lo visible (se ve "muy grande"/cortado) y los botones al fondo de
     una columna flex quedan tapados cuando se abre el teclado. Este valor lo actualiza
     JS con window.visualViewport, que sí refleja el alto real disponible en cada momento.
     100dvh es el fallback moderno mientras carga el JS. */
  --app-height: 100dvh;
}
*{box-sizing:border-box;}
body{margin:0;background:#DCE3EE;font-family:'Inter',sans-serif;color:var(--text-900);}
#app{max-width:430px;min-width:0;margin:0 auto;min-height:var(--app-height);background:var(--bg);position:relative;overflow-x:hidden;box-shadow:0 0 40px rgba(0,0,0,0.15);}
h1,h2,h3,.amount,.brand,button{font-family:'Poppins',sans-serif;}
button{cursor:pointer;font-weight:600;border:none;background:none;color:inherit;}
input,select,textarea{font-family:'Inter',sans-serif;font-size:16px;}
::-webkit-scrollbar{display:none;}
a{color:inherit;}

#screen-root{padding:0 16px 100px;min-height:var(--app-height);}
.screen{animation:fadein .18s ease;}
@keyframes fadein{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:translateY(0);}}
.full-screen{padding:0;min-height:var(--app-height);}

/* Buttons */
.btn{display:flex;align-items:center;justify-content:center;gap:8px;min-height:48px;border-radius:var(--r-btn);padding:0 20px;font-size:16px;width:100%;transition:transform .15s ease, opacity .15s ease;}
.btn:active{transform:scale(0.98);}
.btn-primary{background:var(--blue-900);color:#fff;}
.btn-primary:disabled{opacity:.4;}
.btn-secondary{background:#fff;color:var(--blue-900);border:1.5px solid var(--blue-900);}
.btn-text{color:var(--blue-900);min-height:auto;padding:8px;}
.btn-danger{background:var(--critical);color:#fff;}
.btn-sm{min-height:38px;font-size:14px;padding:0 14px;width:auto;}

/* Cards */
.card{background:#fff;border-radius:var(--r-card);padding:16px;box-shadow:var(--shadow);margin-bottom:16px;}
.section-title{font-size:18px;font-weight:600;margin:0 0 12px;display:flex;align-items:center;justify-content:space-between;}
.section-title.minor{font-size:15px;color:var(--text-700);}
.form-group-label{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--blue-700);margin:20px 0 8px;padding-bottom:6px;border-bottom:1px solid var(--gray-200);}
.form-group-label:first-child{margin-top:4px;}
.section-title small{font-size:13px;font-weight:500;color:var(--blue-700);font-family:'Inter';}

/* Inputs */
.field{margin-bottom:16px;}
.field label{display:block;font-size:13px;font-weight:600;color:var(--text-700);margin-bottom:6px;}
.field .help{font-size:12px;color:var(--text-700);margin-top:4px;}
.field input, .field select, .field textarea{width:100%;border:1.5px solid var(--gray-200);border-radius:var(--r-input);padding:12px 14px;min-height:48px;background:#fff;color:var(--text-900);}
.field input:focus, .field select:focus, .field textarea:focus{outline:none;border-color:var(--blue-400);}
.field.error input{border-color:var(--critical);}
.field .err-msg{color:var(--critical);font-size:12px;margin-top:4px;display:none;}
.field.error .err-msg{display:block;}
.money-display{font-family:'Poppins';font-weight:600;font-size:30px;text-align:center;padding:18px 12px;color:var(--blue-900);border:1.5px solid var(--gray-200);border-radius:var(--r-input);background:#fff;width:100%;}
.money-display:focus{outline:none;border-color:var(--blue-400);background:var(--blue-50);}

/* Chips / badges */
.chip{display:inline-flex;align-items:center;padding:6px 14px;border-radius:100px;background:#fff;border:1.5px solid var(--gray-200);font-size:13px;font-weight:600;color:var(--text-700);white-space:nowrap;}
.chip.active{background:var(--blue-900);border-color:var(--blue-900);color:#fff;}
.chip-row{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;margin-bottom:14px;}
.badge{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:100px;font-size:12px;font-weight:600;}
.badge-normal{background:var(--blue-50);color:var(--blue-900);}
.badge-warning{background:var(--warning-bg);color:#92600A;}
.badge-critical{background:var(--critical-bg);color:#B91C1C;}
.badge-success{background:var(--success-bg);color:#15803D;}

/* progress bar */
.progress-track{height:8px;background:var(--gray-200);border-radius:100px;overflow:hidden;}
.progress-fill{height:100%;border-radius:100px;background:var(--blue-700);transition:width .3s ease;}
.progress-fill.warning{background:var(--warning);}
.progress-fill.critical{background:var(--critical);}
.progress-fill.success{background:var(--success);}

/* Header */
.top-header{display:flex;align-items:center;gap:12px;padding:16px 16px 4px;}
.top-header h2{margin:0;font-size:24px;}
.top-header .back{width:40px;height:40px;border-radius:100px;display:flex;align-items:center;justify-content:center;background:#fff;box-shadow:var(--shadow);flex-shrink:0;}
.top-header .spacer{flex:1;}

/* brand header on dashboard */
.brand-header{padding:16px 0 0;}
.date-line{font-size:13px;color:var(--text-700);}
.brand-row{display:flex;align-items:center;gap:10px;margin:6px 0;}
.brand-row .logo{width:36px;height:36px;flex-shrink:0;}
.brand-row .brand{font-size:20px;font-weight:700;color:var(--blue-900);letter-spacing:.5px;}
.brand-row .spacer{flex:1;}
.icon-btn{width:40px;height:40px;border-radius:100px;background:#fff;box-shadow:var(--shadow);display:flex;align-items:center;justify-content:center;position:relative;}
.icon-btn .dot{position:absolute;top:8px;right:8px;width:8px;height:8px;background:var(--critical);border-radius:100px;}
.slogan{font-size:12px;color:var(--blue-700);font-weight:500;margin:0 0 12px;}
.greeting{font-size:20px;font-weight:600;font-family:'Poppins';margin:4px 0 14px;}

.month-selector{display:flex;align-items:center;justify-content:space-between;background:#fff;border-radius:100px;padding:8px 6px;box-shadow:var(--shadow);margin-bottom:16px;}
.month-selector button{width:34px;height:34px;border-radius:100px;display:flex;align-items:center;justify-content:center;}
.month-selector button:active{background:var(--blue-50);}
.month-selector span{font-weight:600;text-transform:capitalize;font-size:14px;}

/* hero available card */
.hero-card{background:linear-gradient(135deg,var(--blue-900),var(--blue-700));border-radius:var(--r-card);padding:22px 20px;color:#fff;margin-bottom:16px;position:relative;overflow:hidden;}
.hero-card .label{font-size:13px;opacity:.85;font-weight:500;}
.hero-card .amount{font-size:32px;font-weight:600;margin:6px 0 4px;}
.hero-card .support{font-size:12.5px;opacity:.85;}
.hero-card .eye{position:absolute;top:18px;right:18px;width:36px;height:36px;border-radius:100px;background:rgba(255,255,255,0.18);display:flex;align-items:center;justify-content:center;}
.hero-state{display:inline-flex;align-items:center;gap:6px;margin-top:10px;font-size:12.5px;background:rgba(255,255,255,0.15);padding:5px 10px;border-radius:100px;}
.breakdown{background:#fff;border-radius:var(--r-card);padding:16px;margin-bottom:16px;box-shadow:var(--shadow);}
.breakdown .row{display:flex;justify-content:space-between;font-size:14px;padding:6px 0;color:var(--text-700);}
.breakdown .row.total{border-top:1px solid var(--gray-200);margin-top:4px;padding-top:10px;font-weight:700;color:var(--text-900);}

.grid2x2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;}
.mini-card{background:#fff;border-radius:18px;padding:14px;box-shadow:var(--shadow);}
.mini-card .top{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.mini-card .ic{width:30px;height:30px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.mini-card .lbl{font-size:12.5px;color:var(--text-700);font-weight:600;}
.mini-card .val{font-size:17px;font-weight:700;font-family:'Poppins';}

.checklist-row{display:flex;align-items:center;gap:10px;padding:12px 0;border-bottom:1px solid var(--gray-200);}
.checklist-row:last-child{border-bottom:none;}
.checklist-row .ic{width:38px;height:38px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:18px;}
.checklist-row .info{flex:1;min-width:0;}
.checklist-row .info .n{font-weight:600;font-size:14.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.checklist-row .info .d{font-size:12.5px;color:var(--text-700);}
.checklist-row .amt{text-align:right;font-weight:700;font-size:14px;flex-shrink:0;}
.checklist-row .amt .sub{display:block;font-weight:500;font-size:11px;color:var(--text-700);}

.mv-row{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid var(--gray-200);}
.mv-row:last-child{border-bottom:none;}
.mv-row .ic{width:38px;height:38px;border-radius:12px;background:var(--blue-50);color:var(--blue-900);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:17px;}
.mv-row .info{flex:1;min-width:0;}
.mv-row .info .n{font-weight:600;font-size:14.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.mv-row .info .d{font-size:12px;color:var(--text-700);}
.mv-row .amt{font-weight:700;font-size:14.5px;flex-shrink:0;}
.mv-row .amt.income{color:var(--success);}
.mv-row .amt.expense{color:var(--text-900);}
.date-sep{font-size:12px;font-weight:700;color:var(--text-700);text-transform:uppercase;margin:14px 0 4px;}

.goal-card{min-width:200px;background:#fff;border-radius:18px;padding:14px;box-shadow:var(--shadow);margin-right:12px;flex-shrink:0;}
.goal-strip{display:flex;overflow-x:auto;padding-bottom:6px;}

/* Bottom nav */
#bottom-nav{position:fixed;left:0;right:0;bottom:0;max-width:430px;min-width:0;margin:0 auto;background:#fff;display:flex;align-items:center;justify-content:space-around;padding:8px 6px calc(8px + env(safe-area-inset-bottom));box-shadow:0 -2px 16px rgba(0,0,0,0.07);z-index:40;}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:3px;color:#6D7787;font-size:11px;font-weight:600;width:56px;padding:4px 0;}
.nav-item.active{color:var(--blue-900);}
.nav-item svg{width:22px;height:22px;}
.nav-fab{width:56px;height:56px;border-radius:100px;background:var(--blue-900);color:#fff;display:flex;align-items:center;justify-content:center;box-shadow:0 6px 16px rgba(13,71,161,0.4);margin-top:-26px;transition:transform .2s ease;flex-shrink:0;}
.nav-fab:active{transform:scale(0.92);}
.nav-fab svg{width:26px;height:26px;}

/* bottom sheet & modal */
#overlay{position:fixed;inset:0;background:rgba(17,24,39,0.45);z-index:50;display:none;max-width:430px;min-width:0;margin:0 auto;}
#overlay.show{display:block;}
#sheet{position:fixed;left:0;right:0;bottom:0;max-width:430px;min-width:0;margin:0 auto;background:#fff;border-radius:var(--r-sheet) var(--r-sheet) 0 0;z-index:51;padding:10px 20px calc(24px + env(safe-area-inset-bottom));max-height:88vh;overflow-y:auto;transform:translateY(100%);transition:transform .25s ease;}
#sheet.show{transform:translateY(0);}
.sheet-handle{width:40px;height:5px;background:var(--gray-200);border-radius:100px;margin:6px auto 14px;}
.sheet-title{font-size:18px;font-weight:600;margin:0 0 4px;}
.sheet-sub{font-size:13px;color:var(--text-700);margin:0 0 16px;}
.sheet-action{display:flex;align-items:center;gap:14px;padding:14px 4px;border-bottom:1px solid var(--gray-200);}
.sheet-action:last-child{border-bottom:none;}
.sheet-action .ic{width:44px;height:44px;border-radius:14px;background:var(--blue-50);color:var(--blue-900);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:20px;}
.sheet-action .txt .t{font-weight:600;font-size:15px;}
.sheet-action .txt .s{font-size:12.5px;color:var(--text-700);}

#modal-overlay{position:fixed;inset:0;background:rgba(17,24,39,0.5);z-index:60;display:none;align-items:center;justify-content:center;max-width:430px;min-width:0;margin:0 auto;padding:24px;}
#modal-overlay.show{display:flex;}
.modal-box{background:#fff;border-radius:20px;padding:22px;width:100%;box-shadow:var(--shadow);}
.modal-box h3{margin:0 0 8px;font-size:17px;}
.modal-box p{margin:0 0 20px;font-size:14px;color:var(--text-700);line-height:1.5;}
.modal-actions{display:flex;gap:10px;}

/* toast */
#toast{position:fixed;left:50%;bottom:104px;transform:translate(-50%,20px);background:var(--text-900);color:#fff;padding:12px 20px;border-radius:100px;font-size:14px;font-weight:600;opacity:0;transition:all .25s ease;z-index:70;max-width:380px;text-align:center;pointer-events:none;}
#toast.show{opacity:1;transform:translate(-50%,0);}

/* icon library grid */
.icon-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin-bottom:16px;}
.icon-opt{aspect-ratio:1;border-radius:14px;background:var(--blue-50);display:flex;align-items:center;justify-content:center;font-size:19px;border:2px solid transparent;}
.icon-opt.selected{border-color:var(--blue-900);background:var(--blue-100);}

/* onboarding */
.ob-progress{display:flex;gap:5px;padding:20px 20px 0;}
.ob-progress span{flex:1;height:4px;border-radius:100px;background:var(--gray-200);}
.ob-progress span.done{background:var(--blue-900);}
.ob-wrap{padding:24px 20px 24px;display:flex;flex-direction:column;min-height:var(--app-height);}
.ob-body{flex:1;}
.ob-mascot{font-size:52px;text-align:center;margin:10px 0 4px;}
.ob-title{font-size:24px;font-weight:600;margin:14px 0 6px;}
.ob-desc{font-size:14.5px;color:var(--text-700);line-height:1.5;margin:0 0 24px;}
.ob-foot{display:flex;gap:10px;padding-top:16px;}

/* login/pin */
.center-screen{min-height:var(--app-height);display:flex;flex-direction:column;justify-content:center;padding:32px 24px;background:linear-gradient(180deg,var(--blue-900),var(--blue-700) 60%, var(--bg) 60%);}
.login-card{background:#fff;border-radius:24px;padding:28px 22px;box-shadow:var(--shadow);}
.logo-hero{display:flex;flex-direction:column;align-items:center;margin-bottom:28px;}
.logo-hero .logo{width:64px;height:64px;margin-bottom:10px;}
.logo-hero .brand{font-size:30px;color:#fff;font-weight:700;letter-spacing:1px;}
.logo-hero .tag{color:var(--blue-50);font-size:13px;margin-top:2px;}
.pin-dots{display:flex;justify-content:center;gap:16px;margin:30px 0;}
.pin-dots .d{width:16px;height:16px;border-radius:100px;border:2px solid var(--blue-900);}
.pin-dots .d.filled{background:var(--blue-900);}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;max-width:280px;margin:0 auto;}
.pin-key{aspect-ratio:1;border-radius:100px;background:#fff;box-shadow:var(--shadow);font-size:22px;font-weight:600;display:flex;align-items:center;justify-content:center;}
.pin-key:active{background:var(--blue-50);}
.pin-key.ghost{background:none;box-shadow:none;}

.empty-state{text-align:center;padding:48px 20px;}
.empty-state .mascot{font-size:44px;margin-bottom:12px;}
.empty-state p{color:var(--text-700);font-size:14.5px;line-height:1.5;margin:0 0 18px;}

.settings-row{display:flex;align-items:center;gap:12px;padding:14px 4px;border-bottom:1px solid var(--gray-200);}
.settings-row:last-child{border-bottom:none;}
.settings-row .ic{width:36px;height:36px;border-radius:10px;background:var(--blue-50);color:var(--blue-900);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.settings-row .lbl{flex:1;font-weight:600;font-size:14.5px;}
.settings-row .val{color:var(--text-700);font-size:13px;}
.switch{width:44px;height:26px;border-radius:100px;background:var(--gray-200);position:relative;flex-shrink:0;}
.switch.on{background:var(--blue-900);}
.switch .knob{position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:100px;background:#fff;transition:left .2s ease;}
.switch.on .knob{left:21px;}

.stat-bar-row{margin-bottom:12px;}
.stat-bar-row .lbl{display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px;}
.tab-row{display:flex;background:#fff;border-radius:100px;padding:4px;box-shadow:var(--shadow);margin-bottom:16px;}
.tab-row button{flex:1;padding:9px 0;border-radius:100px;font-size:13px;font-weight:600;color:var(--text-700);}
.tab-row button.active{background:var(--blue-900);color:#fff;}

.notif-item{display:flex;gap:12px;padding:14px 4px;border-bottom:1px solid var(--gray-200);}
.notif-item .ic{width:38px;height:38px;border-radius:12px;background:var(--blue-50);color:var(--blue-900);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.notif-item.unread{background:var(--blue-50);border-radius:14px;margin-bottom:4px;border-bottom:none;padding:14px;}
.notif-item .n{font-weight:600;font-size:14px;}
.notif-item .b{font-size:13px;color:var(--text-700);margin:2px 0;}
.notif-item .t{font-size:11px;color:#9CA3AF;}

.amort-row{display:flex;justify-content:space-between;font-size:12.5px;padding:8px 0;border-bottom:1px solid var(--gray-200);}
.footer-brand{text-align:center;padding:28px 0 12px;color:#6D7787;font-size:11px;line-height:1.7;}
.paid-installment{opacity:.55;text-decoration:line-through;}
.cat-group-title{font-size:12px;font-weight:700;color:var(--text-700);text-transform:uppercase;margin:18px 0 6px;}
</style>
</head>
<body>
<div id="app">
  <div id="screen-root"></div>
  <div id="bottom-nav"></div>
  <div id="overlay" onclick="closeSheet()"></div>
  <div id="sheet"></div>
  <div id="modal-overlay"><div class="modal-box" id="modal-box"></div></div>
  <div id="toast"></div>
</div>

<script>
/* ======================= ICONS ======================= */
function icon(name, size){
  size = size || 20;
  const I = {
    home:'<path d="M4 11.5 12 4l8 7.5V20a1 1 0 0 1-1 1h-4.5v-6h-5v6H5a1 1 0 0 1-1-1Z"/>',
    list:'<rect x="4" y="5" width="16" height="3.2" rx="1.2"/><rect x="4" y="10.4" width="16" height="3.2" rx="1.2"/><rect x="4" y="15.8" width="10" height="3.2" rx="1.2"/>',
    plus:'<rect x="10.5" y="4" width="3" height="16" rx="1.5"/><rect x="4" y="10.5" width="16" height="3" rx="1.5"/>',
    calendar:'<rect x="3.5" y="5" width="17" height="15" rx="3"/><path d="M8 3v4M16 3v4M4 10h16" stroke="#fff" stroke-width="1.6"/><path d="m9 14.5 2 2 4-4" stroke="#fff" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>',
    piggy:'<path d="M5 12a6 6 0 0 1 6-6c2.2 0 3 1 4 1h3l-1 2 1 1v3l-2 1v3H14v-2h-3v2H8l-1-2c-1.2-.6-2-1.8-2-3Z"/><circle cx="9" cy="11" r="1" fill="#fff"/>',
    bell:'<path d="M12 3a5 5 0 0 0-5 5v3.2c0 .6-.2 1.2-.6 1.7L5 15h14l-1.4-2.1c-.4-.5-.6-1.1-.6-1.7V8a5 5 0 0 0-5-5Z"/><path d="M10 18a2 2 0 0 0 4 0" stroke="#fff" stroke-width="0" fill="currentColor"/>',
    gear:'<circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M4.2 4.2l2.1 2.1M17.7 17.7l2.1 2.1M2 12h3M19 12h3M4.2 19.8l2.1-2.1M17.7 6.3l2.1-2.1" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>',

function simpleHash(value){
  // Prototipo: evita guardar contraseña/PIN en texto plano. En React/backend debe reemplazarse por hash seguro server-side.
  let h = 2166136261;
  const text = String(value||'');
  for(let i=0;i<text.length;i++){ h ^= text.charCodeAt(i); h += (h<<1)+(h<<4)+(h<<7)+(h<<8)+(h<<24); }
  return 'h'+(h>>>0).toString(16);
}
function migrateSecurityFields(){
  if(!state.user) return;
  if(state.user.password && !state.user.passwordHash){ state.user.passwordHash = simpleHash(state.user.password); }
  if(state.user.pin && !state.user.pinHash){ state.user.pinHash = simpleHash(state.user.pin); }
  delete state.user.password; delete state.user.pin;
}
function normalizeState(){
  if(!state) return;
  (state.categories||[]).forEach(c=>{
    if(c.id==='c_ocio' || c.name==='Ocio') c.name='Entretenimiento';
  });
  // Migración: los estados guardados antes de soportar ingresos quincenales no tienen
  // estos campos. Se completan con un valor mensual equivalente al día ya guardado,
  // sin alterar ningún dato financiero existente.
  if(state.user){
    if(!state.user.incomeFrequency) state.user.incomeFrequency='mensual';
    if(!Array.isArray(state.user.incomeDays) || state.user.incomeDays.length===0){
      state.user.incomeDays=[state.user.primaryIncomeDay||1];
    }
    if(typeof state.user.monthlyBudgetTarget === 'undefined') state.user.monthlyBudgetTarget = 0;
    if(typeof state.user.securityQuestion === 'undefined') state.user.securityQuestion='';
    if(typeof state.user.securityAnswerHash === 'undefined') state.user.securityAnswerHash='';
  }
}

function fmtDateRel(dateStr){
  if(!dateStr) return '';
  const d = new Date(dateStr+'T00:00:00'); const t = new Date(); t.setHours(0,0,0,0);
  const diff = Math.round((d-t)/86400000);
  if(diff===0) return 'Hoy'; if(diff===1) return 'Mañana'; if(diff===-1) return 'Ayer';

// Live money input masking
function attachMoneyMask(input, initialCents){
  function clean(v){ return String(v||'').replace(/[^\d]/g,''); }
  // Quita ceros a la izquierda de la cadena de dígitos. Sin esto, un cero sobrante que
  // el usuario no alcanzó a borrar por completo queda invisible en pantalla (el formato
  // numérico lo oculta) pero sigue contando como un dígito "real" internamente, lo que
  // desalinea el conteo de dígitos usado para ubicar el cursor y corrompe los siguientes
  // números que se escriban.
  function normalize(digits){ return digits.replace(/^0+/,''); }
  function moneyPrefix(){ return state.user.currency==='USD' ? 'US$ ' : '$ '; }
  function formatRaw(raw){
    const digits=normalize(clean(raw));
    if(digits===''){ return moneyPrefix(); } // campo vacío: solo el símbolo, sin "0" pegado
    const num=parseInt(digits,10);
    if(state.user.currency==='USD') return 'US$ ' + num.toLocaleString('en-US');
    return '$ ' + num.toLocaleString('es-CO');
  }
  function digitIndexAt(pos){
    return clean(input.value.slice(0, Math.max(0,pos||0))).length;
  }
  function caretForDigitCount(formatted, count){
    if(count<=0) return moneyPrefix().length;
    let seen=0;
    for(let i=0;i<formatted.length;i++){
      if(/\d/.test(formatted[i])) seen++;
      if(seen>=count) return i+1;
    }
    return formatted.length;
  }
  function setRaw(raw, caretDigit){
    raw = normalize(clean(raw));
    input.dataset.raw = raw;
    input.dataset.value = String(parseInt(raw||'0',10));
    input.value = formatRaw(raw);
    if(typeof caretDigit==='number'){
      const pos=caretForDigitCount(input.value, caretDigit);
      requestAnimationFrame(()=>{ try{ input.setSelectionRange(pos,pos); }catch(_e){} });
    }
  }
  setRaw(String(initialCents||0));
  input.addEventListener('beforeinput', (e)=>{
    const t=e.inputType||'';
    // OJO: usar ?? en vez de || aquí es crítico. dataset.raw puede ser legítimamente
    // una cadena vacía '' cuando el usuario borró el cero inicial, y '' es "falsy" en JS,
    // así que '' || '0' volvía a poner un '0' fantasma que se concatenaba con el siguiente
    // dígito escrito (ej: borrar 0 y escribir 5 guardaba 50 en vez de 5). ?? solo cae al
    // valor por defecto cuando es null/undefined, nunca con cadena vacía.
    const raw=clean(input.dataset.raw ?? '0');
    const start=digitIndexAt(input.selectionStart||0);
    const end=digitIndexAt(input.selectionEnd||input.selectionStart||0);
    let next=raw, caret=start;
    if(t==='insertText' || t==='insertCompositionText' || t==='insertFromPaste'){
      const data=clean(e.data || (e.clipboardData&&e.clipboardData.getData('text')) || '');
      if(!data){ e.preventDefault(); return; }
      next=raw.slice(0,start)+data+raw.slice(end);
      caret=start+data.length;
    }else if(t==='deleteContentBackward'){
      if(start!==end){ next=raw.slice(0,start)+raw.slice(end); caret=start; }
      else if(start>0){ next=raw.slice(0,start-1)+raw.slice(start); caret=start-1; }
      else { caret=0; }
    }else if(t==='deleteContentForward'){
      if(start!==end){ next=raw.slice(0,start)+raw.slice(end); caret=start; }
      else { next=raw.slice(0,start)+raw.slice(start+1); caret=start; }
    }else if(t==='deleteByCut'){
      next=raw.slice(0,start)+raw.slice(end); caret=start;
    }else{
      return;
    }
    e.preventDefault();
    setRaw(next, caret);
  });
  input.addEventListener('input', ()=>{
    // Fallback para navegadores sin beforeinput completo.
    const caretDigits=digitIndexAt(input.selectionStart||0);
    setRaw(input.value, caretDigits);
  });
  input.addEventListener('focus', ()=>{
    if(!clean(input.value)){ setRaw(input.dataset.raw ?? '0', 0); }
  });
  return ()=> parseInt(input.dataset.raw ?? '0',10);
}
function attachDayMask(input){
  input.addEventListener('input', ()=>{
    let v = input.value.replace(/[^\d]/g,'');
    if(v.length>2) v = v.slice(0,2);
    let n = parseInt(v||'0',10);
    if(v!=='' ){ if(n>31) n=31; if(n<1 && v.length>=2) n=1; }
    input.value = n? String(n) : v;
  });
  input.addEventListener('blur', ()=>{
    let n = parseInt(input.value||'0',10);
    if(!n || n<1) n=1; if(n>31) n=31;
    input.value = String(n);
  });
}

/* ======================= CALCULATIONS ======================= */
function periodMovements(period){ return state.movements.filter(m=>m.date.slice(0,7)===period); }
function getIngresado(period){ return periodMovements(period).filter(m=>m.type==='income' && m.sourceType!=='saving_withdrawal').reduce((s,m)=>s+m.amount,0); }
function getGastado(period){ return periodMovements(period).filter(m=>m.type==='expense' && m.sourceType!=='saving_contribution').reduce((s,m)=>s+m.amount,0); }
function periodInstances(period){ return state.obligationInstances.filter(i=>i.period===period); }
function getComprometido(period){
  return periodInstances(period).filter(i=>i.status!=='cancelled').reduce((s,i)=>s+Math.max(0,i.remainingAmount),0);
}
function getAhorroApartado(){
  return state.savingsGoals.reduce((s,g)=>s+g.savedAmount,0);
}
function expectedIncomeDays(){
  const days = (state.user.incomeDays && state.user.incomeDays.length) ? state.user.incomeDays : [state.user.primaryIncomeDay||1];
  return [...days].sort((a,b)=>a-b);
}
// Ingreso de referencia para presupuestar: el mayor entre lo YA registrado este periodo
// (regla del documento 12: la suma presupuestada no puede superar el ingreso registrado)
// y el ingreso mensual proyectado que el usuario declaró (importante para quincenales:
// al inicio del mes, o entre el primer y segundo pago, solo hay registrado un pago parcial,
// pero el usuario ya sabe cuánto va a recibir en total ese mes y necesita poder presupuestar
// sobre esa base sin que la app se lo bloquee).
function budgetReferenceIncome(period){
  return Math.max(getIngresado(period), state.user.monthlyIncomeTarget||0);
}
function getPagadoObligaciones(period){
  return periodInstances(period).reduce((s,i)=>s+i.paidAmount,0);
}
function getDisponibleHoy(period){
  return getIngresado(period) - getGastado(period) - getComprometido(period) - getAhorroApartado();
}
function catById(id){ return state.categories.find(c=>c.id===id); }
function oblById(id){ return state.obligations.find(o=>o.id===id); }
function lastDayOfPeriod(period){
  const [y,m]=period.split('-').map(Number);
  return new Date(y,m,0).getDate();
}
function dueDateForPeriod(period, day){
  const safeDay = Math.min(Math.max(parseInt(day||1,10),1), lastDayOfPeriod(period));
  return period+'-'+String(safeDay).padStart(2,'0');
}
function periodCompare(a,b){ return a.localeCompare(b); }
function periodOffset(period, n){
  let [y,m]=period.split('-').map(Number);
  m+=n; while(m<1){m+=12;y--;} while(m>12){m-=12;y++;}
  return y+'-'+String(m).padStart(2,'0');
}
function earliestPeriodForObligation(ob){
  if(ob.type==='one_time') return ob.dueDate?ob.dueDate.slice(0,7):null;
  if(ob.type==='loan') return (ob.loan && ob.loan.firstPaymentDate)?ob.loan.firstPaymentDate.slice(0,7):null;
  return ob.startDate?ob.startDate.slice(0,7):null;
}
function ensureInstanceForPeriod(ob, period){
  const exists = state.obligationInstances.find(i=>i.obligationId===ob.id && i.period===period);
  if(exists) return;
  let dueDate;
  if(ob.type==='one_time') dueDate = ob.dueDate;
  else dueDate = dueDateForPeriod(period, ob.dueDay || (ob.loan && ob.loan.firstPaymentDate ? parseInt(ob.loan.firstPaymentDate.slice(8,10),10) : 1));
  const expected = ob.type==='loan' ? (ob.loan? (ob.loan.nextInstallmentAmount!=null ? ob.loan.nextInstallmentAmount : ob.loan.installment+(ob.loan.insurance||0)) : ob.expectedAmount) : ob.expectedAmount;
  state.obligationInstances.push({
    id: uid(), obligationId: ob.id, period, expectedAmount: expected,
    paidAmount:0, remainingAmount: expected, dueDate, status:'pending'
  });
}
function ensureMonthInstances(period){
  // Genera la(s) instancia(s) de cada obligación activa desde su fecha de inicio/primer pago
  // hasta `period` (inclusive), rellenando automáticamente los meses que se hayan "saltado".
  // Esto asegura que, si el usuario registra una obligación con una fecha de primer pago
  // anterior a hoy, las cuotas vencidas queden creadas de una vez (sin depender de que
  // el usuario navegue manualmente mes a mes con el selector de periodo).
  state.obligations.forEach(ob=>{
    if(!ob.isActive) return;
    const earliest = earliestPeriodForObligation(ob);
    if(!earliest) return;
    if(periodCompare(earliest, period) > 0) return; // aún no le corresponde ninguna cuota
    if(ob.type==='one_time'){
      ensureInstanceForPeriod(ob, earliest);
      return;
    }
    let p = earliest, guard = 0;
    while(periodCompare(p, period) <= 0 && guard < 600){
      ensureInstanceForPeriod(ob, p);
      p = periodOffset(p, 1);
      guard++;
    }
  });
  // marca como vencida cualquier instancia (de cualquier periodo) que ya pasó su fecha
  const today = todayISO();
  state.obligationInstances.forEach(i=>{
    if((i.status==='pending'||i.status==='partially_paid') && i.dueDate < today && i.remainingAmount>0) i.status='overdue';
  });
}
function budgetGeneralLimit(){
  // Presupuesto general oficial = suma de presupuestos por categoría.
  // El control global de obligaciones es informativo y separado: los pagos de una
  // obligación ya cuentan dentro del gasto de SU categoría (ver confirmPayment,
  // categoryId: ob.categoryId), así que sumar además un límite global de obligaciones
  // aquí estaría presupuestando el mismo dinero dos veces.
  const catSum = state.categoryBudgets.filter(b=>b.period===state.currentPeriod).reduce((s,b)=>s+b.limitAmount,0);
  return catSum || (state.user.monthlyBudgetTarget||0);
}
function assignedCategoryBudget(period){
  return state.categoryBudgets.filter(b=>b.period===period).reduce((s,b)=>s+b.limitAmount,0);
}
function categoryExpense(catId, period){
  return periodMovements(period).filter(m=>m.type==='expense' && m.categoryId===catId).reduce((s,m)=>s+m.amount,0);
}
function statusFromPct(pct){
  if(pct>100) return {key:'critical', label:'Superado'};
  if(pct>=100) return {key:'critical', label:'Límite alcanzado'};
  if(pct>=80) return {key:'warning', label:'En alerta'};
  return {key:'normal', label:'Normal'};
}

/* ======================= LOAN MATH ======================= */
function pmt(P,i,n){ if(i===0) return P/n; return P*(i*Math.pow(1+i,n))/(Math.pow(1+i,n)-1); }
function eaToMonthly(ea){ return Math.pow(1+ea,1/12)-1; }
function impliedMonthlyRate(P,payment,n){
  if(!P || !payment || !n) return 0;
  const minPayment=P/n;
  if(payment<=minPayment) return 0;
  let lo=0, hi=0.01;
  while(pmt(P,hi,n)<payment && hi<10){ hi*=2; }
  for(let k=0;k<120;k++){
    const mid=(lo+hi)/2;
    const c=pmt(P,mid,n);
    if(c>payment) hi=mid; else lo=mid;
  }
  return (lo+hi)/2;
}
function buildAmortization(P,i,n,fixedPayment){
  let balance=P; const rows=[];
  const payment = fixedPayment && fixedPayment>0 ? fixedPayment : pmt(P,i,n);
  for(let k=1;k<=n && balance>0;k++){
    const interest = balance*i;
    let principal = payment-interest;
    if(principal<=0){ principal=0; }
    if(principal>=balance || k===n) principal = balance;
    const rowPayment = interest + principal;
    balance = Math.max(0, balance-principal);
    rows.push({n:k, payment: rowPayment, interest, principal, balance});
  }
  return {payment, rows};
}

  document.getElementById('modal-overlay').classList.add('show');

let __confirmCallback = null;
function confirmAction(title, body, onConfirm, danger){
  // OJO: antes esto hacía onConfirm.toString() y lo reinyectaba como texto en un onclick,
  // lo cual solo funciona si la función no depende de nada más que valores ya escritos
  // literalmente en el HTML (como '${id}'). En cuanto un callback depende de una variable
  // real en memoria (ej. el resultado de leer un archivo con FileReader), el texto
  // reconstruido se ejecuta en un contexto global donde esa variable ya no existe, y
  // truena con ReferenceError. Guardar la función real evita esa clase entera de bugs.
  __confirmCallback = onConfirm;
  openModal(title, body, `
    <button class="btn btn-secondary btn-sm" style="flex:1" onclick="closeModal()">Cancelar</button>
    <button class="btn ${danger?'btn-danger':'btn-primary'} btn-sm" style="flex:1" onclick="runConfirmCallback()">Confirmar</button>
  `);
}
function runConfirmCallback(){
  const cb = __confirmCallback;
  __confirmCallback = null;
  closeModal();
  if(cb) cb();
}

function render(){
  const root=document.getElementById('screen-root');
  const fns={
    login: screenLogin, pin: screenPin, onboarding: screenOnboarding,
    home: screenHome, movements: screenMovements, obligations: screenObligations,

    notifications: screenNotifications, settings: screenSettings,

  };

  afterRenderHooks();
}
function afterRenderHooks(){
  document.querySelectorAll('[data-money]').forEach(inp=>{
    if(inp._masked) return; inp._masked=true;
    attachMoneyMask(inp, inp.getAttribute('data-init')||0);
  });
  document.querySelectorAll('[data-day]').forEach(inp=>{
    if(inp._masked) return; inp._masked=true;
    attachDayMask(inp);

}

/* ======================= LOGIN / PIN ======================= */
function screenLogin(){
  return `<div class="center-screen full-screen">

      <button class="btn btn-primary" onclick="doLogin()">Ingresar</button>

      ${!state.onboardingDone?`<button class="btn btn-text" style="width:100%;margin-top:10px" onclick="nav('onboarding',{step:0})">Crear cuenta nueva</button>`:`<button class="btn btn-text" style="width:100%;margin-top:10px;color:var(--critical)" onclick="confirmResetPrototype()">Reiniciar datos de prueba</button>`}

}
function doLogin(){
  const nick=document.getElementById('li-nick').value.trim();
  const pass=document.getElementById('li-pass').value;

}
function confirmResetPrototype(){
  confirmAction('Reiniciar datos de prueba','Esto eliminará todos los datos guardados de ANKA en este navegador. Úsalo solo si deseas empezar desde cero.', ()=>resetPrototypeData(), true);
}
function resetPrototypeData(){

  state = defaultState();
  sessionUnlocked = false;
  showToast('Datos de prueba reiniciados');
  nav('login');
}
/* ======================= RECUPERACIÓN DE CONTRASEÑA / PIN ======================= */
// ANKA no usa correo electrónico como credencial (decisión cerrada del MVP), así que la
// recuperación se resuelve con una pregunta de seguridad configurada en el onboarding.
// Si el usuario nunca la configuró (cuentas creadas antes de esta función), no hay forma
// de recuperar de forma segura y se lo indicamos claramente en vez de fingir que sí.
function openRecoverySheet(){
  if(!hasRecoverySetup()){
    openSheet(`<div class="sheet-handle"></div><div class="sheet-title">Recuperar acceso</div>
    <div class="sheet-sub">Esta cuenta no tiene una pregunta de seguridad configurada (fue creada antes de que existiera esta opción), así que no podemos verificar tu identidad de forma segura.</div>
    <div class="help" style="margin-bottom:16px">Como ANKA guarda tus datos solo en este navegador y no usa correo, la única alternativa es reiniciar y empezar de nuevo. Esto borra los datos guardados en este dispositivo.</div>
    <button class="btn btn-danger" onclick="closeSheet();confirmResetPrototype();">Reiniciar datos de prueba</button>`);
    return;
  }
  uiTemp.recovery = {answered:false};
  renderRecoverySheet();
}
function renderRecoverySheet(){
  const r = uiTemp.recovery;
  if(!r.answered){
    openSheet(`<div class="sheet-handle"></div><div class="sheet-title">Recuperar acceso</div>
    <div class="sheet-sub">Responde tu pregunta de seguridad para continuar.</div>
    <div class="field"><label>${state.user.securityQuestion}</label><input id="rec-answer" placeholder="Tu respuesta"></div>
    <button class="btn btn-primary" onclick="verifyRecoveryAnswer()">Verificar</button>`);
  } else {
    openSheet(`<div class="sheet-handle"></div><div class="sheet-title">Crea nuevos accesos</div>
    <div class="sheet-sub">Identidad verificada. Define una nueva contraseña y un nuevo PIN.</div>
    <div class="field"><label>Nueva contraseña</label><input id="rec-pass" type="password" placeholder="Mínimo 4 caracteres"></div>
    <div class="field"><label>Nuevo PIN (4 dígitos)</label><input id="rec-pin" inputmode="numeric" maxlength="4" placeholder="Ej: 1234"></div>
    <button class="btn btn-primary" onclick="saveRecovery()">Guardar y entrar</button>`);
  }
}
function verifyRecoveryAnswer(){
  const a=document.getElementById('rec-answer').value;
  if(!securityAnswerMatches(a)){ showToast('La respuesta no coincide'); return; }
  uiTemp.recovery.answered=true;
  renderRecoverySheet();
}
function saveRecovery(){
  const pass=document.getElementById('rec-pass').value;
  const pin=document.getElementById('rec-pin').value;
  if(!pass||pass.length<4){ showToast('La contraseña debe tener al menos 4 caracteres'); return; }
  if(!/^\d{4}$/.test(pin)){ showToast('El PIN debe ser de 4 dígitos'); return; }
  state.user.passwordHash=simpleHash(pass);
  state.user.pinHash=simpleHash(pin);
  saveState(); closeSheet(); showToast('Contraseña y PIN actualizados');
  sessionUnlocked=true; ensureMonthInstances(state.currentPeriod); nav('home');
}
function screenPin(){
  const len=(uiTemp.pinBuffer||'').length;
  return `<div class="center-screen full-screen">
    <div class="logo-hero">${ankaLogo(48,'#fff')}<div class="brand" style="font-size:22px">anka</div></div>
    <div class="login-card" style="text-align:center">
      <div style="font-weight:600;font-size:16px">Ingresa tu PIN</div>
      <div class="pin-dots">${[0,1,2,3].map(i=>`<div class="d ${i<len?'filled':''}"></div>`).join('')}</div>
      <div class="pin-pad">
        ${[1,2,3,4,5,6,7,8,9].map(n=>`<button class="pin-key" onclick="pinKey('${n}')">${n}</button>`).join('')}
        <div class="pin-key ghost"></div>
        <button class="pin-key" onclick="pinKey('0')">0</button>
        <button class="pin-key" onclick="pinKey('back')">⌫</button>
      </div>
      <button class="btn btn-text" style="margin-top:6px" onclick="openRecoverySheet()">¿Olvidaste tu PIN?</button>
    </div>
  </div>`;
}
function pinKey(k){
  uiTemp.pinBuffer = uiTemp.pinBuffer||'';
  if(k==='back'){ uiTemp.pinBuffer=uiTemp.pinBuffer.slice(0,-1); render(); return; }
  if(uiTemp.pinBuffer.length>=4) return;
  uiTemp.pinBuffer += k;
  render();
  if(uiTemp.pinBuffer.length===4){
    setTimeout(()=>{
      if(pinMatches(uiTemp.pinBuffer)){ sessionUnlocked=true; ensureMonthInstances(state.currentPeriod); nav('home'); }
      else { showToast('PIN incorrecto'); uiTemp.pinBuffer=''; render(); }
    },150);
  }
}

function formatMoneyCurrency(n,cur){ return (cur==='USD'?'US$ ':'$ ') + Math.round(n||0).toLocaleString(cur==='USD'?'en-US':'es-CO'); }
function toggleQuickOb(name){

function syncQuickObFromDOM(){

    const day=document.getElementById(`obq-day-${idx}`); if(day) q.day=Math.min(31,Math.max(1,parseInt(day.value||'1',10)));

function obPinKey(k){

function obNext(){
  const step=uiTemp.step||0; const ob=uiTemp.ob;
  if(step===0){
    const nick=document.getElementById('ob-nick').value.trim();
    const pass=document.getElementById('ob-pass').value;
    const secq=document.getElementById('ob-secq').value;
    const seca=document.getElementById('ob-seca').value.trim();
    if(!nick){ showToast('Ingresa tu nick'); return; }

    if(!seca){ showToast('Responde la pregunta de seguridad para poder recuperar tu cuenta después'); return; }
    ob.nickname=nick; ob.password=pass; ob.securityQuestion=secq; ob.securityAnswer=seca;
  } else if(step===2){
    const day=parseInt(document.getElementById('ob-day').value||'1',10);
    ob.incomeDay = Math.min(31,Math.max(1,day||1));
    if(ob.incomeFrequency==='quincenal'){
      const day2El=document.getElementById('ob-day2');
      const day2=parseInt((day2El?day2El.value:'')||'15',10);
      ob.incomeDay2 = Math.min(31,Math.max(1,day2||15));
      if(ob.incomeDay2===ob.incomeDay){ showToast('Los dos días de pago deben ser distintos'); return; }
    }
  } else if(step===3){
    const val=parseInt(document.getElementById('ob-income').dataset.raw||'0',10);
    if(val<=0){ showToast('Registra un monto válido para continuar'); return; }
    ob.incomeAmount=val;
  } else if(step===4){
    const val=parseInt(document.getElementById('ob-budget').dataset.raw||'0',10);
    const projected = ob.incomeFrequency==='quincenal' ? ob.incomeAmount*2 : ob.incomeAmount;
    if(val>projected){ showToast(ob.incomeFrequency==='quincenal' ? 'El presupuesto no puede superar tu ingreso mensual proyectado (los dos pagos quincenales)' : 'El presupuesto no puede superar el ingreso registrado'); return; }
    ob.budgetGeneral=val;
  } else if(step===5){
    if(ob.quickObligations.length===0){ showToast('Selecciona al menos una obligación para continuar'); return; }
  } else if(step===6){
    syncQuickObFromDOM();
    for(const q of ob.quickObligations){
      q.name=(q.name||'').trim();
      if(!q.name){ showToast('Todas las obligaciones necesitan nombre'); return; }
      if(q.amount<=0){ showToast('Todas las obligaciones necesitan un valor mayor a cero'); return; }
      if(q.categoryId==='__new'){
        const newName=(q.newCategoryName||'').trim();
        if(!newName){ showToast('Escribe el nombre de la nueva categoría'); return; }
        const nc={id:uid(),name:newName,type:'expense',icon:q.newCategoryIcon||'🧾',isDefault:false,isActive:true};
        state.categories.push(nc); q.categoryId=nc.id;
      }
    }
  } else if(step===7){
    if(!ob.pin || ob.pin.length!==4){ showToast('El PIN debe tener 4 dígitos'); return; }
  }
  uiTemp.step=step+1; render();
}
function obPrev(){ uiTemp.step=Math.max(0,(uiTemp.step||0)-1); render(); }
function finishOnboarding(){
  const ob=uiTemp.ob;
  state.user.nickname=ob.nickname; state.user.passwordHash=simpleHash(ob.password); state.user.pinHash=simpleHash(ob.pin);
  state.user.securityQuestion=ob.securityQuestion; state.user.securityAnswerHash=simpleHash(normalizeAnswer(ob.securityAnswer));
  state.user.currency=ob.currency;
  state.user.incomeFrequency=ob.incomeFrequency;
  state.user.incomeDays = ob.incomeFrequency==='quincenal' ? [ob.incomeDay, ob.incomeDay2] : [ob.incomeDay];
  state.user.primaryIncomeDay=ob.incomeDay; // se conserva por compatibilidad con pantallas que aún leen un solo día
  // El ingreso mensual proyectado (usado como referencia para presupuestar antes de que
  // esté todo registrado) es la suma de ambos pagos si es quincenal, no solo el primero.
  state.user.monthlyIncomeTarget = ob.incomeFrequency==='quincenal' ? ob.incomeAmount*2 : ob.incomeAmount;
  state.user.monthlyBudgetTarget = ob.budgetGeneral||0;
  state.currentPeriod=currentPeriodStr();
  state.movements.push({id:uid(),type:'income',amount:ob.incomeAmount,categoryId:'c_salario',description: ob.incomeFrequency==='quincenal' ? 'Primer pago quincenal' : 'Ingreso principal',date:todayISO(),note:'',sourceType:'manual',createdAt:Date.now()});
  // La meta inicial de presupuesto se guarda como referencia general (monthlyBudgetTarget),
  // no como una categoría "Otros" artificial: así no se confunde con un límite real de gasto
  // por categoría hasta que el usuario distribuya su presupuesto desde Presupuestos.
  ob.quickObligations.forEach(q=>{
    state.obligations.push({id:uid(),name:q.name,categoryId:q.categoryId,type:'recurring',expectedAmount:q.amount,frequency:'mensual',dueDay:q.day,startDate:todayISO(),endDate:null,isVariable:false,isActive:true,loan:null});
  });
  state.onboardingDone=true;
  ensureMonthInstances(state.currentPeriod);
  saveState();
  sessionUnlocked=true;
  nav('home');
}

function obligationCategoriesOverview(){
  const cats=state.categories.filter(c=>c.type==='expense' && c.isActive);

    const insts=periodInstances(period).filter(i=>obs.some(o=>o.id===i.obligationId));
    const pending=insts.reduce((s,i)=>s+Math.max(0,i.remainingAmount),0);
    const paid=insts.reduce((s,i)=>s+i.paidAmount,0);
    const overdueCount=insts.filter(i=>i.status==='overdue').length;
    const total=pending+paid;
    const paidPct= total? Math.round(paid/total*100) : 0;

  if(!rows.length) return `<div class="card empty-state"><p>No hay obligaciones activas para agrupar por categoría.</p></div>`;

  rows.sort((a,b)=> (b.overdueCount>0)-(a.overdueCount>0) || b.pending-a.pending);

        </div>
        <div style="flex:1;min-width:0">
          <div style="font-weight:700">${cat.name}</div>
          <div style="font-size:12px;color:var(--text-700)">${obs.length} obligación(es)${budget?' · Presupuesto '+formatMoney(budget):''}</div>
        </div>

      <div style="display:flex;justify-content:space-between;align-items:center;font-size:12.5px;margin-top:6px">

  const inst = state.obligationInstances.find(i=>i.id===instId);
  const ob = oblById(inst.obligationId);
  openSheet(`<div class="sheet-handle"></div><div class="sheet-title">Confirmar pago</div><div class="sheet-sub">${ob.name} · Saldo pendiente ${formatMoney(inst.remainingAmount)}</div>
  <input data-money data-init="${inst.remainingAmount}" id="pay-amount" class="money-display" inputmode="numeric">
  <div class="field"><label>Fecha de pago</label><input type="date" id="pay-date" value="${todayISO()}"></div>
  <button class="btn btn-primary" onclick="confirmPayment('${instId}')">Confirmar pago</button>`);

function confirmPayment(instId){
  const amount=parseInt(document.getElementById('pay-amount').dataset.raw||'0',10);
  const date=document.getElementById('pay-date').value||todayISO();
  const inst = state.obligationInstances.find(i=>i.id===instId);
  const ob = oblById(inst.obligationId);
  if(amount<=0){ showToast('El monto debe ser mayor a cero'); return; }
  if(amount>inst.remainingAmount){ showToast('El pago no puede superar el saldo pendiente'); return; }
  inst.paidAmount += amount;
  inst.remainingAmount = Math.max(0, inst.remainingAmount-amount);
  inst.status = inst.remainingAmount<=0 ? 'paid' : 'partially_paid';
  state.movements.push({id:uid(),type:'expense',amount,categoryId:ob.categoryId,description:ob.name,date,note:'',sourceType:'obligation_payment',sourceId:inst.id,createdAt:Date.now()});
  if(ob.type==='loan' && ob.loan){
    const insurance = ob.loan.insurance||0;
    const loanPortion = Math.max(0, amount-insurance);
    const rate = ob.loan.monthlyRate;
    const interest = ob.loan.currentBalance*rate;
    const principal = Math.min(ob.loan.currentBalance, Math.max(0, loanPortion-interest));
    ob.loan.currentBalance = Math.max(0, ob.loan.currentBalance-principal);
    if(inst.status==='paid'){
      ob.loan.paidInstallments = (ob.loan.paidInstallments||0)+1;
      ob.loan.nextInstallmentAmount = null;
    }
    if(ob.loan.currentBalance<=0) ob.isActive=false;
  }
  saveState(); closeSheet(); showToast('Pago confirmado'); render();
}

    <div class="field"><label>¿Con qué dinero se pagó?</label><select id="hist-source"><option value="previous">Dinero anterior / no descontar del mes actual</option><option value="current">Sueldo actual / descontar como gasto</option></select><div class="help">Si fue con dinero anterior, se registra historial pero no afecta Disponible hoy actual.</div></div>
    <div class="card" style="box-shadow:none;border:1px solid var(--gray-200)"><div class="section-title" style="font-size:15px">Si es un préstamo antiguo</div>
      <div class="field"><label>Saldo actual real después de este pago</label><input data-money data-init="0" id="hist-loan-balance" inputmode="numeric"><div class="help">Opcional. Úsalo si conoces el saldo real de la deuda.</div></div>
      <div class="field"><label>Cuotas pagadas acumuladas</label><input id="hist-loan-paid" inputmode="numeric" placeholder="Ej: 8"><div class="help">Opcional. Ayuda a alinear préstamos que ya venían en curso.</div></div>
    </div>
    <button class="btn btn-primary" onclick="saveHistoricalPayment()">Guardar pago histórico</button>`);
}
function saveHistoricalPayment(){
  const obId=document.getElementById('hist-ob').value;
  const date=document.getElementById('hist-date').value||todayISO();
  const amount=parseInt(document.getElementById('hist-amount').dataset.raw||'0',10);
  const source=document.getElementById('hist-source').value;
  const ob=oblById(obId);
  if(!ob){ showToast('Selecciona una obligación'); return; }
  if(amount<=0){ showToast('El valor debe ser mayor a cero'); return; }
  const period=date.slice(0,7);
  let inst=state.obligationInstances.find(i=>i.obligationId===obId && i.period===period);
  if(!inst){
    inst={id:uid(),obligationId:obId,period,expectedAmount:Math.max(amount,ob.expectedAmount||amount),paidAmount:0,remainingAmount:Math.max(amount,ob.expectedAmount||amount),dueDate:date,status:'pending',historical:true};
    state.obligationInstances.push(inst);
  }
  inst.paidAmount += amount;
  inst.remainingAmount = Math.max(0,(inst.expectedAmount||amount)-inst.paidAmount);
  inst.status = inst.remainingAmount<=0 ? 'paid' : 'partially_paid';
  inst.historical = true;
  inst.paidWith = source;
  if(source==='current'){
    state.movements.push({id:uid(),type:'expense',amount,categoryId:ob.categoryId,description:ob.name+' (pago histórico)',date,note:'Pago histórico registrado manualmente',sourceType:'obligation_payment',sourceId:inst.id,createdAt:Date.now()});
  }
  if(ob.type==='loan' && ob.loan){
    const realBalance = parseInt((document.getElementById('hist-loan-balance')?.dataset.raw)||'0',10);
    const paidAccum = parseInt((document.getElementById('hist-loan-paid')?.value)||'',10);
    if(realBalance>0){
      ob.loan.currentBalance = Math.min(ob.loan.principal, realBalance);
    }else{
      const insurance = ob.loan.insurance||0;
      const loanPortion = Math.max(0, amount-insurance);
      const interest = Math.max(0, (ob.loan.currentBalance||0) * (ob.loan.monthlyRate||0));
      const principalPaid = Math.min(ob.loan.currentBalance||0, Math.max(0, loanPortion - interest));
      ob.loan.currentBalance = Math.max(0, (ob.loan.currentBalance||0) - principalPaid);
    }
    if(!Number.isNaN(paidAccum) && paidAccum>=0){
      ob.loan.paidInstallments = Math.min(ob.loan.term, paidAccum);
    }else if(inst.status==='paid'){
      ob.loan.paidInstallments = Math.min(ob.loan.term, (ob.loan.paidInstallments||0)+1);
    }
    if(ob.loan.currentBalance<=0) ob.isActive=false;
  }
  saveState(); closeSheet(); showToast(source==='current'?'Pago histórico guardado y descontado':'Pago histórico guardado sin afectar dinero actual'); render();
}

function resolveObCategory(){
  syncObFormFromDOM();
  const f=uiTemp.obForm; let categoryId=f.categoryId;
  if(categoryId==='__new'){
    const newName=(f.newCategoryName||'').trim();
    if(!newName){ showToast('Escribe el nombre de la nueva categoría'); return null; }
    const nc={id:uid(),name:newName,type:'expense',icon:f.newCategoryIcon||'🧾',isDefault:false,isActive:true};
    state.categories.push(nc); categoryId=nc.id;
  }
  return categoryId;
}
function saveObligation(){
  syncObFormFromDOM();
  const f=uiTemp.obForm;
  const name=(f.name||'').trim();
  if(!name){ showToast('El nombre es obligatorio'); return; }
  const categoryId=resolveObCategory(); if(!categoryId) return;
  if(f.type==='recurring' || f.type==='one_time'){
    const amount=parseInt(f.amount||0,10);
    if(amount<=0){ showToast('El valor debe ser mayor a cero'); return; }
    const newOb={id:uid(),name,categoryId,type:f.type,expectedAmount:amount,frequency:f.type==='recurring'?'mensual':null,
      dueDay: f.type==='recurring'? Math.min(31,Math.max(1,parseInt(f.dueDay||'1',10))) : null,
      dueDate: f.type==='one_time'? f.dueDate : null,
      startDate:todayISO(), endDate:null, isVariable:false, isActive:true, reminderFiveDays:f.reminderFiveDays!==false, reminderDueDay:f.reminderDueDay!==false, loan:null};
    state.obligations.push(newOb);
  } else {
    const principal=parseInt(f.principal||0,10);
    const term=parseInt(f.term||0,10);
    if(principal<=0||term<=0){ showToast('Completa capital y plazo'); return; }
    let monthlyRate, installment;
    if(f.rateMode==='rate'){
      const ea=parseFloat(f.ea||'0')/100;
      monthlyRate=eaToMonthly(ea); installment=Math.round(pmt(principal,monthlyRate,term));
    } else {
      installment=parseInt(f.installment||0,10);
      if(installment<=0){ showToast('Ingresa la cuota mensual'); return; }
      monthlyRate=impliedMonthlyRate(principal,installment,term);
    }
    const firstPaymentDate=f.firstPaymentDate||todayISO();
    const insurance=Math.max(0,parseInt(f.insurance||0,10));
    const newOb={id:uid(),name,categoryId,type:'loan',expectedAmount:installment+insurance,frequency:'mensual',
      dueDay: parseInt(firstPaymentDate.slice(8,10),10), dueDate:null, startDate:todayISO(),endDate:null,isVariable:false,isActive:true, reminderFiveDays:true, reminderDueDay:true,
      loan:{principal,term,monthlyRate,installment,insurance,firstPaymentDate,paidInstallments:0,currentBalance:principal,adjustments:[],nextInstallmentAmount:null}};
    state.obligations.push(newOb);
  }
  ensureMonthInstances(state.currentPeriod);
  saveState(); uiTemp.obForm=null; showToast('Obligación guardada'); nav('obligations');
}

function openEditLoanInsurance(obId){
  const ob=oblById(obId); if(!ob || !ob.loan) return;
  openSheet(`<div class="sheet-handle"></div><div class="sheet-title">Seguro mensual del préstamo</div>
  <div class="sheet-sub">Se suma a la cuota que ves cada mes, pero no afecta el cálculo de intereses ni la tabla de amortización.</div>
  <input data-money data-init="${ob.loan.insurance||0}" id="loan-insurance" class="money-display" inputmode="numeric">
  <button class="btn btn-primary" style="margin-top:16px" onclick="saveLoanInsurance('${obId}')">Guardar</button>`);
}
function saveLoanInsurance(obId){
  const ob=oblById(obId); if(!ob || !ob.loan) return;
  const insurance=Math.max(0,parseInt(document.getElementById('loan-insurance').dataset.raw||'0',10));
  ob.loan.insurance=insurance;
  // Actualiza también la cuota pendiente del periodo actual si todavía no se ha pagado,
  // para que el cambio se refleje de inmediato y no solo desde el próximo mes.
  const currentInst = periodInstances(state.currentPeriod).find(i=>i.obligationId===obId && i.status!=='paid' && i.status!=='cancelled');
  if(currentInst && currentInst.remainingAmount===currentInst.expectedAmount){
    const newExpected = (ob.loan.nextInstallmentAmount!=null ? ob.loan.nextInstallmentAmount : ob.loan.installment) + insurance;
    currentInst.expectedAmount = newExpected;
    currentInst.remainingAmount = newExpected;
  }
  saveState(); closeSheet(); showToast('Seguro actualizado'); render();
}
function toggleObligation(id){ const ob=oblById(id); ob.isActive=!ob.isActive; saveState(); showToast('Actualizado'); render(); }
function finishObligation(id){ const ob=oblById(id); ob.isActive=false; ob.endDate=todayISO(); saveState(); showToast('Obligación finalizada'); nav('obligations'); }
function deleteObligation(id){
  // Se elimina la obligación y sus cuotas/instancias (pasadas y futuras) para que no
  // aparezca en listados ni en Comprometido. Los movimientos de pagos ya registrados NO se
  // borran (son historial real de gasto), solo se desvincula su referencia a la obligación.
  // OJO: los movimientos de tipo 'obligation_payment' guardan sourceId = id de la INSTANCIA
  // (no de la obligación), mientras que 'debt_payment' (abonos extra) guardan sourceId = id
  // de la obligación directamente. Hay que cubrir ambos casos.
  const instanceIds = state.obligationInstances.filter(i=>i.obligationId===id).map(i=>i.id);
  state.movements.forEach(m=>{
    if(m.sourceType==='obligation_payment' && instanceIds.includes(m.sourceId)) m.sourceId=null;
    if(m.sourceType==='debt_payment' && m.sourceId===id) m.sourceId=null;
  });
  state.obligationInstances = state.obligationInstances.filter(i=>i.obligationId!==id);
  state.obligations = state.obligations.filter(o=>o.id!==id);
  saveState(); showToast('Obligación eliminada'); nav('obligations');
}

function setExtraMode(m){ uiTemp.extraMode=m; document.getElementById('extra-mode-term').classList.toggle('active',m==='term'); document.getElementById('extra-mode-fee').classList.toggle('active',m==='fee'); }
function applyExtraPayment(obId){
  const ob=oblById(obId);
  const amount=parseInt(document.getElementById('extra-amount').dataset.raw||'0',10);
  if(amount<=0||amount>ob.loan.currentBalance){ showToast('Ingresa un monto válido, no mayor al saldo'); return; }
  ob.loan.currentBalance -= amount;
  const remaining = ob.loan.term - (ob.loan.paidInstallments||0);
  if(uiTemp.extraMode==='term'){
    let n=1; while(pmt(ob.loan.currentBalance, ob.loan.monthlyRate, n) > ob.loan.installment && n<remaining){ n++; }
    ob.loan.term = (ob.loan.paidInstallments||0)+n;
  } else {
    ob.loan.installment = Math.round(pmt(ob.loan.currentBalance, ob.loan.monthlyRate, remaining));
  }
  state.movements.push({id:uid(),type:'expense',amount,categoryId:ob.categoryId,description:ob.name+' (abono extra)',date:todayISO(),note:'Abono a capital',sourceType:'debt_payment',sourceId:ob.id,createdAt:Date.now()});
  saveState(); closeSheet(); showToast('Abono aplicado'); nav('obligationDetail',{id:obId});
}

  const ob=oblById(obId); if(!ob || !ob.loan) return;
  const currentInst = periodInstances(state.currentPeriod).find(i=>i.obligationId===obId && i.status!=='paid' && i.status!=='cancelled');
  openSheet(`<div class="sheet-handle"></div><div class="sheet-title">Ajustar cuotas</div><div class="sheet-sub">Úsalo si la deuda fue diferida a más cuotas, si la próxima cuota será mayor o si aparecen cuota de manejo u otros cargos.</div>
    <div class="field"><label>Nuevo plazo total en meses</label><input id="loan-new-term" inputmode="numeric" value="${ob.loan.term}"><div class="help">Aumenta este valor si la deuda fue diferida a más cuotas.</div></div>
    <div class="field"><label>Valor especial del próximo pago</label><input data-money data-init="${currentInst?currentInst.remainingAmount:(ob.loan.nextInstallmentAmount||ob.loan.installment+(ob.loan.insurance||0))}" id="loan-next-payment" inputmode="numeric"><div class="help">Reemplaza el cálculo automático de este pago. Si tienes seguro configurado, este valor debe incluirlo (no se suma aparte).</div></div>
    <div class="field"><label>Cargo adicional al saldo</label><input data-money data-init="0" id="loan-extra-charge" inputmode="numeric"><div class="help">Ejemplo: cuota de manejo, comisión o cargo financiero que se sumó al saldo de la deuda. Si es un seguro mensual recurrente, edítalo desde el detalle del préstamo en vez de aquí.</div></div>
    <div class="field"><label>Motivo del ajuste</label><input id="loan-adjust-reason" placeholder="Ej: diferido a 24 cuotas, cuota de manejo"></div>
    <button class="btn btn-primary" onclick="saveLoanAdjustment('${obId}')">Guardar ajuste</button>`);
}
function saveLoanAdjustment(obId){
  const ob=oblById(obId); if(!ob || !ob.loan) return;
  const newTerm=parseInt(document.getElementById('loan-new-term').value||ob.loan.term,10);
  const nextPayment=parseInt(document.getElementById('loan-next-payment').dataset.raw||'0',10);
  const extraCharge=parseInt(document.getElementById('loan-extra-charge').dataset.raw||'0',10);
  const reason=document.getElementById('loan-adjust-reason').value.trim()||'Ajuste de préstamo';
  if(newTerm<=0){ showToast('El plazo debe ser válido'); return; }
  if(newTerm!==ob.loan.term) ob.loan.term=newTerm;
  if(extraCharge>0) ob.loan.currentBalance += extraCharge;
  if(nextPayment>0) ob.loan.nextInstallmentAmount=nextPayment;
  const currentInst = periodInstances(state.currentPeriod).find(i=>i.obligationId===obId && i.status!=='paid' && i.status!=='cancelled');
  if(currentInst && nextPayment>0){
    const delta = nextPayment - currentInst.expectedAmount;
    currentInst.expectedAmount = nextPayment;
    currentInst.remainingAmount = Math.max(0, currentInst.remainingAmount + delta);
  }
  ob.loan.adjustments = ob.loan.adjustments || [];
  ob.loan.adjustments.push({date:todayISO(),newTerm,nextPayment,extraCharge,reason});
  saveState(); closeSheet(); showToast('Ajuste guardado'); nav('obligationDetail',{id:obId});
}

/* ======================= NOTIFICATIONS ======================= */
function computeNotifications(){
  // derive dynamic notifications (not persisted individually, just displayed)
  const notifs=[];
  const period=state.currentPeriod;
  ensureMonthInstances(period);
  periodInstances(period).forEach(i=>{
    const ob=oblById(i.obligationId); if(!ob) return;
    if(i.status==='overdue') notifs.push({id:'ov-'+i.id,title:'Obligación vencida',body:`${ob.name} venció y sigue pendiente.`,type:'obligation',relatedId:ob.id,date:i.dueDate,action:'obligationDetail'});
    else if(i.status!=='paid'){
      const days=Math.round((new Date(i.dueDate)-new Date(todayISO()))/86400000);
      if(days===0 && ob.reminderDueDay!==false) notifs.push({id:'due-'+i.id,title:'Vence hoy',body:`${ob.name} vence hoy.`,type:'obligation',relatedId:ob.id,date:i.dueDate,action:'obligationDetail'});
      else if(days>0 && days<=5 && ob.reminderFiveDays!==false) notifs.push({id:'due-'+i.id,title:'Próximo pago',body:`${ob.name} vence ${fmtDateRel(i.dueDate)}.`,type:'obligation',relatedId:ob.id,date:i.dueDate,action:'obligationDetail'});
    }
  });
  const catBudgets=state.categoryBudgets.filter(b=>b.period===period);
  catBudgets.forEach(b=>{
    const spent=categoryExpense(b.categoryId,period); const pct=b.limitAmount?spent/b.limitAmount*100:0; const cat=catById(b.categoryId);
    if(pct>=100) notifs.push({id:'b100-'+b.id,title:'Presupuesto superado',body:`Superaste tu presupuesto de ${cat.name}.`,type:'budget',relatedId:b.categoryId,date:todayISO(),action:'budgets'});
    else if(pct>=80) notifs.push({id:'b80-'+b.id,title:'Atención',body:`Has consumido el 80% de tu presupuesto de ${cat.name}.`,type:'budget',relatedId:b.categoryId,date:todayISO(),action:'budgets'});
  });
  const ingreso=getIngresado(period), usado=getGastado(period)+getComprometido(period)+getAhorroApartado();
  if(ingreso>0 && usado/ingreso>=0.8) notifs.push({id:'avail80-'+period,title:'Atención: 80% del dinero comprometido',body:'Ya usaste o comprometiste al menos el 80% de tus ingresos del mes.',type:'budget',relatedId:null,date:todayISO(),action:'available'});
  // Recordatorio de ingresos por día de pago esperado. Con un solo ingreso mensual esto
  // equivale a la lógica anterior; con dos pagos quincenales, sigue avisando del segundo
  // pago aunque el primero ya se haya registrado (antes dejaba de avisar apenas
  // getIngresado(period) pasaba de 0, sin importar si faltaba el segundo pago).
  const incomeCountThisPeriod = periodMovements(period).filter(m=>m.type==='income' && m.sourceType!=='saving_withdrawal').length;
  const todayDay = parseInt(todayISO().slice(8,10),10);
  expectedIncomeDays().forEach((payDay,idx)=>{
    if(todayDay>=payDay && incomeCountThisPeriod<=idx){
      const ordinal = expectedIncomeDays().length>1 ? (idx===0?'primer':'segundo')+' pago quincenal' : 'ingreso';
      notifs.push({id:'income-'+period+'-'+idx,title:'Registra tu '+ordinal,body:`Ya deberías haber recibido tu ${ordinal} de este mes (día ${payDay}). Regístralo para mantener tu disponible al día.`,type:'income',relatedId:null,date:todayISO(),action:'movements'});
    }
  });
  return notifs;
}
function screenNotifications(){
  const notifs=computeNotifications();
  return `<div class="screen">${subHeader('Notificaciones', "nav('home')")}
  <div class="card">${notifs.length===0? `<div class="empty-state"><div class="mascot">🔔</div><p>Todo está bajo control. No tienes alertas pendientes.</p></div>`:
    notifs.map(n=>`<div class="notif-item unread" onclick="handleNotifTap('${n.action}','${n.relatedId||''}')">
      <div class="ic">${icon(n.type==='budget'?'stats':n.type==='income'?'download':'calendar',18)}</div>
      <div style="flex:1"><div class="n">${n.title}</div><div class="b">${n.body}</div><div class="t">${fmtDateRel(n.date)}</div></div>
    </div>`).join('')}
  </div></div>`;
}
function handleNotifTap(action, relatedId){
  if(action==='obligationDetail') nav('obligationDetail',{id:relatedId});
  else if(action==='budgets') nav('budgets');
  else if(action==='movements') nav('movements');
  else if(action==='available') nav('available');
}

  <button class="btn btn-primary" onclick="saveCurrency('${other}')">Cambiar a ${other}</button>
  <button class="btn btn-text" onclick="closeSheet()">Cancelar</button>`);
}
function saveCurrency(c){
  state.user.currency=c; saveState(); closeSheet(); render(); showToast('Moneda cambiada a '+c);
}
function openEditSecurityQuestion(){
  openSheet(`<div class="sheet-handle"></div><div class="sheet-title">Pregunta de seguridad</div>
  <div class="sheet-sub">Se usa para recuperar tu contraseña o PIN si los olvidas. Debes escribir tu contraseña actual para cambiarla.</div>
  <div class="field"><label>Pregunta</label><select id="secq-select">${SECURITY_QUESTIONS.map(q=>`<option value="${q}" ${state.user.securityQuestion===q?'selected':''}>${q}</option>`).join('')}</select></div>
  <div class="field"><label>Nueva respuesta</label><input id="secq-answer" placeholder="Tu respuesta"></div>
  <div class="field"><label>Confirma tu contraseña actual</label><input id="secq-pass" type="password" placeholder="Contraseña actual"></div>
  <button class="btn btn-primary" onclick="saveSecurityQuestion()">Guardar</button>`);
}
function saveSecurityQuestion(){
  const q=document.getElementById('secq-select').value;
  const a=document.getElementById('secq-answer').value.trim();
  const pass=document.getElementById('secq-pass').value;
  if(!passwordMatches(pass)){ showToast('La contraseña actual no coincide'); return; }
  if(!a){ showToast('Escribe una respuesta'); return; }
  state.user.securityQuestion=q; state.user.securityAnswerHash=simpleHash(normalizeAnswer(a));
  saveState(); closeSheet(); showToast('Pregunta de seguridad actualizada');
}
function openIncomeScheduleEditor(){
  uiTemp.incomeEdit = {
    frequency: state.user.incomeFrequency||'mensual',
    day1: expectedIncomeDays()[0]||1,
    day2: expectedIncomeDays()[1]||15,
  };
  renderIncomeScheduleSheet();
}
function setIncomeEditFrequency(f){ uiTemp.incomeEdit.frequency=f; renderIncomeScheduleSheet(); }
function renderIncomeScheduleSheet(){
  const e=uiTemp.incomeEdit;
  const quinc = e.frequency==='quincenal';
  openSheet(`<div class="sheet-handle"></div><div class="sheet-title">Frecuencia y día(s) de ingreso</div>
  <div class="sheet-sub">Esto ajusta cuándo te recordamos registrar tu ingreso y cuánto proyectamos como tu ingreso mensual antes de que esté todo registrado.</div>
  <div class="chip-row" style="margin:12px 0">
    <button class="chip ${!quinc?'active':''}" onclick="setIncomeEditFrequency('mensual')">Mensual</button>
    <button class="chip ${quinc?'active':''}" onclick="setIncomeEditFrequency('quincenal')">Quincenal</button>
  </div>
  <div class="field"><label>${quinc?'Día del primer pago':'Día habitual de ingreso'}</label><input data-day id="inc-day1" inputmode="numeric" value="${e.day1}"></div>
  ${quinc?`<div class="field"><label>Día del segundo pago</label><input data-day id="inc-day2" inputmode="numeric" value="${e.day2}"></div>`:''}
  <div class="field"><label>Ingreso mensual proyectado${quinc?' (suma de tus dos pagos)':''}</label><input data-money data-init="${state.user.monthlyIncomeTarget||0}" id="inc-target" inputmode="numeric"><div class="help">Se usa como referencia para presupuestar antes de que registres todos tus ingresos del mes. No reemplaza tu ingreso real registrado.</div></div>
  <button class="btn btn-primary" onclick="saveIncomeSchedule()">Guardar</button>`);
}
function saveIncomeSchedule(){
  const e=uiTemp.incomeEdit;
  const day1=Math.min(31,Math.max(1,parseInt(document.getElementById('inc-day1').value||'1',10)));
  let days=[day1];
  if(e.frequency==='quincenal'){
    const day2=Math.min(31,Math.max(1,parseInt(document.getElementById('inc-day2').value||'15',10)));
    if(day2===day1){ showToast('Los dos días de pago deben ser distintos'); return; }
    days=[day1,day2].sort((a,b)=>a-b);
  }
  const target=parseInt(document.getElementById('inc-target').dataset.raw||'0',10);
  state.user.incomeFrequency=e.frequency;
  state.user.incomeDays=days;
  state.user.primaryIncomeDay=days[0];
  state.user.monthlyIncomeTarget=target;
  saveState(); closeSheet(); render(); showToast('Actualizado');
}

function screenCategories(){
  const cats=state.categories.filter(c=>c.type==='expense');
  return `<div class="screen">${subHeader('Categorías e iconos', "nav('settings')")}
  <div class="card"><div class="section-title">Categorías de gasto</div>
  ${cats.map(c=>`<div class="settings-row"><div class="ic">${c.icon}</div><div class="lbl">${c.name}</div><button class="btn btn-secondary btn-sm" onclick="openCategoryEditor('${c.id}')">Editar</button></div>`).join('')}</div>
  <button class="btn btn-primary" onclick="openCategoryEditor()">Crear categoría</button>
  </div>`;
}
function openCategoryEditor(catId){
  const cat=catId?catById(catId):{id:null,name:'',icon:'🧾',type:'expense'};
  uiTemp.catEdit={...cat};
  renderCategoryEditorSheet();
}
function renderCategoryEditorSheet(){
  const c=uiTemp.catEdit;
  openSheet(`<div class="sheet-handle"></div><div class="sheet-title">${c.id?'Editar categoría':'Crear categoría'}</div>
  <div class="field"><label>Nombre</label><input id="cat-name" value="${c.name||''}" placeholder="Ej: Mascotas, servicios, colegio"></div>
  <div class="field"><label>Icono</label><div class="icon-grid">${CAT_ICONS.map(ic=>`<button type="button" class="icon-opt ${c.icon===ic?'selected':''}" onclick="uiTemp.catEdit.icon='${ic}';renderCategoryEditorSheet()">${ic}</button>`).join('')}</div></div>
  <button class="btn btn-primary" onclick="saveCategoryEdit()">Guardar categoría</button>`);
}
function saveCategoryEdit(){
  const name=document.getElementById('cat-name').value.trim();
  if(!name){ showToast('El nombre es obligatorio'); return; }
  if(uiTemp.catEdit.id){ const c=catById(uiTemp.catEdit.id); c.name=name; c.icon=uiTemp.catEdit.icon; }
  else state.categories.push({id:uid(),name,type:'expense',icon:uiTemp.catEdit.icon||'🧾',isDefault:false,isActive:true});
  saveState(); closeSheet(); showToast('Categoría guardada'); if(currentScreen==='obligationCategory'){ render(); } else { nav('categories'); }
}

/* ======================= BACKUP / EXPORT ======================= */
function screenBackup(){
  return `<div class="screen">${subHeader('Respaldo y exportación', "nav('settings')")}
  <div class="card">
    <div class="section-title">Respaldo completo</div>
    <p style="font-size:13px;color:var(--text-700);margin:0 0 14px">Guarda toda tu información: configuración, categorías, movimientos, obligaciones, préstamos, presupuestos y metas.</p>
    <button class="btn btn-primary" style="margin-bottom:10px" onclick="createBackup()">Crear respaldo completo</button>
    <label class="btn btn-secondary" style="display:flex">Restaurar respaldo completo<input type="file" accept="application/json" style="display:none" onchange="restoreBackup(event)"></label>
  </div>
  <div class="card">
    <div class="section-title">Exportar movimientos</div>
    ${state.movements.length===0?'<p style="font-size:13px;color:var(--text-700)">Todavía no hay datos para exportar. Registra algunos movimientos primero.</p>':`
    <button class="btn btn-secondary" style="margin-bottom:10px" onclick="exportCSV()">Exportar a CSV</button>
    <button class="btn btn-secondary" onclick="exportExcel()">Exportar a Excel</button>`}
  </div>
  </div>`;
}
function download(filename, content, mime){
  const blob=new Blob([content],{type:mime}); const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url; a.download=filename; document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
}
function createBackup(){ download('anka_respaldo_'+todayISO()+'.json', JSON.stringify(state,null,2), 'application/json'); showToast('Respaldo creado'); }
function restoreBackup(ev){
  const file=ev.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=()=>{
    let parsed;
    try{
      parsed = JSON.parse(reader.result);
    }catch(e){
      console.error('Backup JSON parse error', e);
      showToast('El archivo no es un JSON válido. Verifica que sea el .json exportado por ANKA.');
      ev.target.value='';
      return;
    }
    if(!parsed || typeof parsed!=='object' || !parsed.user || !Array.isArray(parsed.movements)){
      showToast('Este archivo no tiene el formato de un respaldo de ANKA.');
      ev.target.value='';
      return;
    }
    confirmAction('Restaurar respaldo','Esto reemplazará todos tus datos actuales. ¿Deseas continuar?', ()=>{
      try{
        state = parsed;
        // Se migra y normaliza de inmediato y de forma síncrona (en vez de dejarlo en manos
        // del guardado con debounce de saveState) para que la pantalla de inicio no intente
        // pintarse con un estado a medio completar justo después de restaurar.
        migrateSecurityFields();
        normalizeState();
        localStorage.setItem('anka_state', JSON.stringify(state));
        sessionUnlocked = true;
        showToast('Respaldo restaurado');
        nav('home');
      }catch(e){
        console.error('Backup restore error', e);
        showToast('El archivo es un JSON válido pero no se pudo aplicar: '+(e.message||'error desconocido'));
      }
      ev.target.value='';
    }, true);
  };
  reader.onerror=()=>{ showToast('No se pudo leer el archivo. Intenta de nuevo.'); };
  reader.readAsText(file);
}
function exportCSV(){
  const rows=[['Fecha','Tipo','Categoría','Descripción','Monto','Nota']];
  state.movements.forEach(m=>rows.push([m.date,m.type,catById(m.categoryId)?.name||'',m.description,m.amount,m.note||'']));
  const csv=rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  download('anka_movimientos.csv', csv, 'text/csv');
  showToast('CSV exportado');
}
function exportExcel(){
  let table='<table border="1"><tr><th>Fecha</th><th>Tipo</th><th>Categoría</th><th>Descripción</th><th>Monto</th><th>Nota</th></tr>';
  state.movements.forEach(m=>table+=`<tr><td>${m.date}</td><td>${m.type}</td><td>${catById(m.categoryId)?.name||''}</td><td>${m.description}</td><td>${m.amount}</td><td>${m.note||''}</td></tr>`);
  table+='</table>';
  download('anka_movimientos.xls', table, 'application/vnd.ms-excel');
  showToast('Excel exportado');
}

/* ======================= VIEWPORT REAL (teclado móvil) ======================= */
// En navegadores móviles, innerHeight/100vh no se achica cuando aparece el teclado
// (en iOS Safari nunca; en Android Chrome depende de la config). visualViewport.height
// sí refleja el área realmente visible, así que lo usamos para --app-height: cuando el
// teclado se abre, los contenedores en columna (.ob-wrap, .center-screen, etc.) se
// encogen de verdad y el botón "Continuar" queda arriba del teclado en vez de tapado.
function setAppHeight(){
  const h = (window.visualViewport ? window.visualViewport.height : window.innerHeight);
  document.documentElement.style.setProperty('--app-height', h + 'px');
}
setAppHeight();
window.addEventListener('resize', setAppHeight);
window.addEventListener('orientationchange', setAppHeight);
if(window.visualViewport){
  window.visualViewport.addEventListener('resize', setAppHeight);
  window.visualViewport.addEventListener('scroll', setAppHeight);
}

/* ======================= BOOT ======================= */
async function boot(){
  await loadState();
  if(!state.onboardingDone){ nav('login'); }
  else { nav('login'); }
}
boot();
</script>
